<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkCycle — Calendar</title>
 <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="logo">Pink<span>Cycle</span></div>
    <p class="tagline">your gentle cycle companion</p>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">Dashboard</a>
      <a href="calendar.html" class="active">Calendar</a>
      <a href="update.html">Update</a>
    </nav>
  </header>

  <!-- ═══ MAIN CONTENT ═════════════════════════════════════════ -->
  <main class="wrapper">

    <div class="card">

      <!-- Month navigation header -->
      <div class="calendar-header">
        <button
          id="prev-month"
          class="cal-nav-btn"
          aria-label="Previous month"
        >&#8249;</button>

        <!-- calendar.js will update this text -->
        <h2 class="month-label" id="month-label">Loading…</h2>

        <button
          id="next-month"
          class="cal-nav-btn"
          aria-label="Next month"
        >&#8250;</button>
      </div>

      <!--
        The calendar is a <table> for semantic correctness
        (days of week in <thead>, day cells in <tbody>).
        calendar.js dynamically builds the <tbody> content.
      -->
      <table class="calendar-grid" role="grid" aria-label="Period prediction calendar">

        <!-- Days of the week header row -->
        <thead>
          <tr>
            <th scope="col" abbr="Sunday">Sun</th>
            <th scope="col" abbr="Monday">Mon</th>
            <th scope="col" abbr="Tuesday">Tue</th>
            <th scope="col" abbr="Wednesday">Wed</th>
            <th scope="col" abbr="Thursday">Thu</th>
            <th scope="col" abbr="Friday">Fri</th>
            <th scope="col" abbr="Saturday">Sat</th>
          </tr>
        </thead>

        <!-- calendar.js fills this in dynamically -->
        <tbody id="calendar-body">
          <!-- Day cells are generated by JavaScript -->
        </tbody>

      </table>

      <!-- Legend explaining the colour coding -->
      <div class="cal-legend" aria-label="Calendar legend">
        <div class="cal-legend-item">
          <div class="cal-legend-dot dot-period"></div>
          <span>Predicted period days</span>
        </div>
        <div class="cal-legend-item">
          <div class="cal-legend-dot dot-today"></div>
          <span>Today</span>
        </div>
      </div>

    </div><!-- /.card -->

    <!-- Tip: shown below the calendar -->
    <p class="text-center" style="font-size:0.82rem; color: var(--color-text-muted); margin-top: 4px;">
      Tap any date to log or update a period start.
      Predictions are generated for the next 120 days.
    </p>

  </main>

  <!-- ═══ FOOTER ════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <p>PinkCycle &mdash; a gentle period tracker &hearts;</p>
  </footer>

  <script type="module" src="calendar.js"></script>

</body>
</html>
